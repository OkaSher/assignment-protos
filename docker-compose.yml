services:
  rabbitmq:
    image: rabbitmq:3.13-management
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payments
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payments"]
      interval: 10s
      timeout: 5s
      retries: 8
    volumes:
      - pgdata:/var/lib/postgresql/data

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    environment:
      GRPC_PORT: "50051"
      POSTGRES_DSN: host=db port=5432 user=postgres password=postgres dbname=payments sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      PAYMENT_QUEUE: payment.completed
      REDIS_DSN: redis:6379
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy
    ports:
      - "50051:50051"

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      PAYMENT_QUEUE: payment.completed
      REDIS_DSN: redis:6379
      PROVIDER_MODE: SIMULATED
      EMAIL_RETRY_COUNT: "3"
      EMAIL_RETRY_BASE_MS: "2000"
    depends_on:
      rabbitmq:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    environment:
      HTTP_PORT: "8080"
      PAYMENT_GRPC_ADDR: payment-service:50051
      REDIS_DSN: redis:6379
      CACHE_TTL_SEC: "300"
      RATE_LIMIT_PER_MIN: "10"
    depends_on:
      payment-service:
        condition: service_started
    ports:
      - "8080:8080"

  redis:
    image: redis:7-alpine
    hostname: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8

volumes:
  pgdata:
