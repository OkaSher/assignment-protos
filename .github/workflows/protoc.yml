name: Generate and Push Protos
on:
  push:
    branches: [ "main" ]
jobs:
  generate-protos:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Protos
      uses: actions/checkout@v3

    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'

    - name: Install Protoc
      uses: arduino/setup-protoc@v2
      with:
        version: "24.4"

    - name: Install Protoc Go Plugins
      run: |
        go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
        go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Checkout Generated Repo
      uses: actions/checkout@v3
      with:
        repository: OkaSher/assignment-generated
        token: ${{ secrets.GH_PAT }}
        path: generated-repo

    - name: Generate Go Code
      run: |
        protoc --go_out=generated-repo --go_opt=paths=source_relative \
             --go-grpc_out=generated-repo --go-grpc_opt=paths=source_relative \
             --proto_path=. payment/payment.proto
             
        protoc --go_out=generated-repo --go_opt=paths=source_relative \
             --go-grpc_out=generated-repo --go-grpc_opt=paths=source_relative \
             --proto_path=. order/order.proto

    - name: Push to Generated Repo
      run: |
        cd generated-repo
        if [ ! -f "go.mod" ]; then
          go mod init github.com/OkaSher/assignment-generated
        fi
        go mod tidy
        git config user.name "GitHub Action"
        git config user.email "action@github.com"
        git add .
        git commit -m "Auto-generated proto code" || echo "No changes"
        git push
